<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Spark — Importa LinkedIn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    html,
    body,
    button,
    h1,
    code {
      font-family: "Open Sans", sans-serif;
    }
    body {
      width: 300px;
      margin: 0;
      padding: 14px;
      font-size: 13px;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(310deg, #2152ff 0%, #21d4fd 100%);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 2.5em;
    }
    .err {
      color: #b91c1c;
    }
    .ok {
      color: #047857;
    }
  </style>
</head>
<body>
  <h1>Spark · Importa LinkedIn</h1>
  <button id="go" type="button">Leggi profilo e apri nuovo candidato (Spark)</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
